<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-[420px] text-center flex flex-col items-center">
        <h1 class="text-2xl font-bold mb-2 text-gray-800">Painel WhatsApp Node</h1>

        <div id="status-message" class="text-sm font-semibold text-gray-500 mb-3 px-4 py-2 rounded-full bg-gray-100">
            Iniciando verificacao...
        </div>

        <p id="status-detail" class="text-xs text-gray-500 mb-5 min-h-[20px]"></p>

        <div id="qrcode-wrapper" class="mb-4 w-full flex flex-col items-center">
            <div id="qrcode" class="min-h-[256px] flex justify-center items-center"></div>
            <p id="qr-updated-at" class="text-xs text-gray-400 mt-3 hidden"></p>
        </div>

        <div id="send-form" class="w-full flex-col gap-3 hidden mt-2">
            <input type="text" id="phone" placeholder="Ex: 5511999999999" class="w-full border p-2 rounded focus:ring-2 focus:ring-green-400 outline-none text-sm">
            <textarea id="message" placeholder="Escreva sua mensagem aqui..." class="w-full border p-2 rounded focus:ring-2 focus:ring-green-400 outline-none text-sm resize-none"></textarea>
            <button onclick="sendMessage()" class="w-full bg-green-600 hover:bg-green-700 transition text-white p-2 rounded font-bold text-sm">Disparar Mensagem</button>
            <p id="send-status" class="text-xs text-center font-semibold mt-1"></p>
        </div>

        <div id="batch-form" class="w-full hidden mt-4 border-t pt-4">
            <button onclick="sendBatch()" class="w-full bg-slate-800 hover:bg-slate-900 transition text-white p-2 rounded font-bold text-sm">Enviar Em Lote Pela Planilha</button>
            <p class="text-xs text-gray-500 mt-2">Numeros: <span class="font-semibold">node-app/Planilha/numeros.csv</span></p>
            <p class="text-xs text-gray-500 mt-1">Mensagens: <span class="font-semibold">node-app/Planilha/mensagens.txt</span></p>
            <p id="batch-status" class="text-xs text-center font-semibold mt-2"></p>
        </div>

        <div id="session-form" class="w-full hidden mt-4">
            <button onclick="resetConnection()" class="w-full bg-red-600 hover:bg-red-700 transition text-white p-2 rounded font-bold text-sm">Desconectar WhatsApp E Gerar Novo QR Code</button>
            <p id="session-status" class="text-xs text-center font-semibold mt-2"></p>
        </div>
    </div>

    <script>
        const statusMessage = document.getElementById('status-message');
        const statusDetail = document.getElementById('status-detail');
        const qrCodeContainer = document.getElementById('qrcode');
        const qrCodeWrapper = document.getElementById('qrcode-wrapper');
        const qrUpdatedAt = document.getElementById('qr-updated-at');
        const sendForm = document.getElementById('send-form');
        const batchForm = document.getElementById('batch-form');
        const sessionForm = document.getElementById('session-form');

        const qrCode = new QRCode(qrCodeContainer, {
            width: 256,
            height: 256,
            colorDark: '#0f172a',
            colorLight: '#ffffff'
        });

        let lastQrString = '';
        let lastUpdatedAt = '';
        let isCheckingStatus = false;

        function setStatusStyles(type) {
            statusMessage.className = 'text-sm font-semibold mb-3 px-4 py-2 rounded-full';

            if (type === 'connected') {
                statusMessage.classList.add('text-green-700', 'bg-green-100');
                return;
            }

            if (type === 'warning') {
                statusMessage.classList.add('text-yellow-700', 'bg-yellow-100');
                return;
            }

            if (type === 'error') {
                statusMessage.classList.add('text-red-700', 'bg-red-100');
                return;
            }

            statusMessage.classList.add('text-gray-600', 'bg-gray-100');
        }

        function renderQrCode(qrString, updatedAt) {
            qrCodeContainer.style.display = 'flex';
            qrCodeWrapper.style.display = 'flex';
            qrUpdatedAt.classList.remove('hidden');

            if (qrString !== lastQrString || updatedAt !== lastUpdatedAt) {
                qrCode.clear();
                qrCode.makeCode(qrString);
                lastQrString = qrString;
                lastUpdatedAt = updatedAt || '';
            }

            qrUpdatedAt.textContent = updatedAt
                ? 'Ultima atualizacao: ' + new Date(updatedAt).toLocaleTimeString('pt-BR')
                : '';
        }

        function clearQrCode() {
            qrCode.clear();
            qrCodeContainer.innerHTML = '';
            lastQrString = '';
            lastUpdatedAt = '';
            qrUpdatedAt.textContent = '';
            qrUpdatedAt.classList.add('hidden');
        }

        async function checkStatus() {
            if (isCheckingStatus) {
                return;
            }

            isCheckingStatus = true;

            try {
                const response = await fetch('/api/whatsapp-status?t=' + Date.now(), {
                    cache: 'no-store',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache'
                    }
                });

                const data = await response.json();
                statusDetail.textContent = data.message || '';

                if (data.status === 'connected') {
                    setStatusStyles('connected');
                    statusMessage.textContent = 'WhatsApp conectado com sucesso!';
                    clearQrCode();
                    qrCodeWrapper.style.display = 'none';
                    sendForm.classList.remove('hidden');
                    sendForm.classList.add('flex');
                    batchForm.classList.remove('hidden');
                    sessionForm.classList.remove('hidden');
                    return;
                }

                sendForm.classList.add('hidden');
                sendForm.classList.remove('flex');
                batchForm.classList.add('hidden');
                sessionForm.classList.add('hidden');
                qrCodeWrapper.style.display = 'flex';

                if (data.status === 'waiting_qr' && data.qr_string) {
                    setStatusStyles('warning');
                    statusMessage.textContent = 'Aguardando leitura do QR code...';
                    renderQrCode(data.qr_string, data.updated_at);
                    return;
                }

                if (data.status === 'disconnected' || data.status === 'error') {
                    setStatusStyles('error');
                    statusMessage.textContent = 'Nao foi possivel manter a conexao.';
                    clearQrCode();
                    return;
                }

                setStatusStyles('default');
                statusMessage.textContent = 'Preparando conexao com o WhatsApp...';
                clearQrCode();
            } catch (error) {
                setStatusStyles('error');
                statusMessage.textContent = 'Falha ao consultar o status do WhatsApp.';
                statusDetail.textContent = 'Tentando novamente automaticamente...';
            } finally {
                isCheckingStatus = false;
            }
        }

        async function sendMessage() {
            const phoneInput = document.getElementById('phone');
            const messageInput = document.getElementById('message');
            const normalizedPhone = phoneInput.value.replace(/\D/g, '');
            const message = messageInput.value;
            const statusText = document.getElementById('send-status');

            if (!normalizedPhone || !message) {
                statusText.innerText = 'Preencha numero e mensagem!';
                statusText.className = 'text-xs text-center font-semibold mt-1 text-red-500';
                return;
            }

            if (normalizedPhone.length < 12) {
                statusText.innerText = 'Use DDI + DDD + numero. Exemplo: 5511999999999';
                statusText.className = 'text-xs text-center font-semibold mt-1 text-red-500';
                return;
            }

            statusText.innerText = 'Enviando...';
            statusText.className = 'text-xs text-center font-semibold mt-1 text-gray-500';

            try {
                const response = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ phone: normalizedPhone, message })
                });

                const data = await response.json().catch(() => ({
                    status: 'error',
                    message: 'Resposta invalida do servidor'
                }));

                if (response.ok && data.status === 'success') {
                    statusText.innerText = 'Mensagem entregue!';
                    statusText.className = 'text-xs text-center font-semibold mt-1 text-green-600';
                    phoneInput.value = normalizedPhone;
                    messageInput.value = '';
                    return;
                }

                statusText.innerText = 'Erro ao enviar: ' + (data.message || 'falha desconhecida');
                statusText.className = 'text-xs text-center font-semibold mt-1 text-red-500';
            } catch (error) {
                statusText.innerText = 'Erro ao enviar a mensagem.';
                statusText.className = 'text-xs text-center font-semibold mt-1 text-red-500';
            }
        }

        async function sendBatch() {
            const statusText = document.getElementById('batch-status');
            statusText.innerText = 'Lendo planilha e enviando em lote...';
            statusText.className = 'text-xs text-center font-semibold mt-2 text-gray-500';

            try {
                const response = await fetch('/api/send-batch', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json().catch(() => ({
                    status: 'error',
                    message: 'Resposta invalida do servidor'
                }));

                if (response.ok && data.status === 'success') {
                    statusText.innerText = `${data.message} Total de numeros: ${data.total_numbers}.`;
                    statusText.className = 'text-xs text-center font-semibold mt-2 text-green-600';
                    return;
                }

                statusText.innerText = 'Erro no lote: ' + (data.message || 'falha desconhecida');
                statusText.className = 'text-xs text-center font-semibold mt-2 text-red-500';
            } catch (error) {
                statusText.innerText = 'Erro ao iniciar o envio em lote.';
                statusText.className = 'text-xs text-center font-semibold mt-2 text-red-500';
            }
        }

        async function resetConnection() {
            const statusText = document.getElementById('session-status');
            statusText.innerText = 'Desconectando sessao atual e gerando novo QR code...';
            statusText.className = 'text-xs text-center font-semibold mt-2 text-gray-500';

            try {
                const response = await fetch('/api/reset-connection', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json().catch(() => ({
                    status: 'error',
                    message: 'Resposta invalida do servidor'
                }));

                if (response.ok && data.status === 'success') {
                    statusText.innerText = data.message;
                    statusText.className = 'text-xs text-center font-semibold mt-2 text-green-600';
                    return;
                }

                statusText.innerText = 'Erro ao reiniciar sessao: ' + (data.message || 'falha desconhecida');
                statusText.className = 'text-xs text-center font-semibold mt-2 text-red-500';
            } catch (error) {
                statusText.innerText = 'Erro ao reiniciar a conexao.';
                statusText.className = 'text-xs text-center font-semibold mt-2 text-red-500';
            }
        }

        checkStatus();
        setInterval(checkStatus, 1000);
    </script>
</body>
</html>
